<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../_shared/chrome.css" />
<style>
  .wrap { width: min(560px, 100%); }
  .card { padding: 26px; }
  .group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
  .group:last-child { margin-bottom: 0; }
  .label { width: 100%; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted-2); }
  .b { border: 0; border-radius: 10px; font: 600 14px var(--font); cursor: pointer; display: inline-flex;
       align-items: center; gap: 8px; transition: transform .08s, filter .15s, box-shadow .15s; }
  .b:active { transform: translateY(1px); }
  .b.primary { background: var(--primary); color: #fff; box-shadow: 0 6px 16px color-mix(in srgb, var(--primary) 35%, transparent); }
  .b.primary:hover { filter: brightness(1.08); }
  .b.secondary { background: var(--surface-2); color: var(--text); }
  .b.outline { background: transparent; color: var(--primary); box-shadow: inset 0 0 0 1.5px var(--primary); }
  .b.ghost { background: transparent; color: var(--primary); }
  .b.ghost:hover { background: var(--primary-weak); }
  .b.danger { background: var(--danger); color: #fff; }
  .b[disabled] { opacity: .5; cursor: not-allowed; box-shadow: none; filter: none; }
  .b.sm { padding: 7px 12px; font-size: 12px; }
  .b.md { padding: 10px 16px; }
  .b.lg { padding: 14px 22px; font-size: 16px; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
             border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toggle { margin-left: auto; display: inline-flex; gap: 8px; align-items: center; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<header id="demo-chrome"></header>
<main class="demo-stage">
  <div class="wrap panel card">
    <div class="group">
      <span class="label">Variantes</span>
      <button class="b primary md" id="cta">Confirmar acción</button>
      <button class="b secondary md">Secundario</button>
      <button class="b outline md">Outline</button>
      <button class="b ghost md">Ghost</button>
      <button class="b danger md">Eliminar</button>
    </div>
    <div class="group">
      <span class="label">Tamaños</span>
      <button class="b primary sm">Small</button>
      <button class="b primary md">Medium</button>
      <button class="b primary lg">Large</button>
      <label class="toggle"><input type="checkbox" id="dis" /> deshabilitado</label>
    </div>
  </div>
</main>
<footer id="demo-note"></footer>
<script src="../_shared/chrome.js"></script>
<script>
  const cta = document.getElementById('cta');
  const dis = document.getElementById('dis');
  const allBtns = [...document.querySelectorAll('.b')];

  cta.addEventListener('click', () => {
    if (cta.dataset.busy) return;
    cta.dataset.busy = '1';
    const original = cta.textContent;
    cta.innerHTML = '<span class="spinner"></span> Procesando…';
    setTimeout(() => {
      cta.innerHTML = '✓ Listo';
      setTimeout(() => { cta.textContent = original; delete cta.dataset.busy; }, 1100);
    }, 1200);
  });

  dis.addEventListener('change', () => {
    allBtns.forEach((b) => { if (b !== cta) b.disabled = dis.checked; });
    cta.disabled = dis.checked;
  });
</script>
</body>
</html>
