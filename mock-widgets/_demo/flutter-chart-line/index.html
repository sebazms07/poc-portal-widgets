<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../_shared/chrome.css" />
<style>
  .chart { width: min(600px, 100%); padding: 20px; }
  .legend { display: flex; gap: 16px; margin-bottom: 8px; font-size: 13px; }
  .legend button { border: 0; background: none; cursor: pointer; display: inline-flex; gap: 7px; align-items: center; color: var(--text); }
  .legend .dot { width: 12px; height: 12px; border-radius: 3px; }
  .legend .off { opacity: .35; text-decoration: line-through; }
  svg { width: 100%; height: 260px; display: block; overflow: visible; }
  .axis { stroke: var(--border); stroke-width: 1; }
  .gl { stroke: var(--border); stroke-width: 1; stroke-dasharray: 3 4; opacity: .6; }
  .lbl { fill: var(--muted-2); font: 11px var(--font); }
  .ln { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        transition: opacity .2s; }
  .area { opacity: .12; transition: opacity .2s; }
  .guide { stroke: var(--muted-2); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0; }
  .dot-pt { transition: opacity .15s; opacity: 0; }
  .tip { position: absolute; pointer-events: none; background: var(--surface); border: 1px solid var(--border);
         border-radius: 9px; box-shadow: var(--shadow); padding: 8px 10px; font-size: 12px; opacity: 0;
         transition: opacity .12s; transform: translate(-50%, -110%); white-space: nowrap; }
  .tip .t-m { font-weight: 600; margin-bottom: 4px; }
  .tip .t-r { display: flex; gap: 6px; align-items: center; color: var(--muted); }
  .wrap { position: relative; }
</style>
</head>
<body>
<header id="demo-chrome"></header>
<main class="demo-stage">
  <div class="chart panel">
    <div class="legend" id="legend"></div>
    <div class="wrap">
      <svg id="svg" viewBox="0 0 600 260" preserveAspectRatio="none"></svg>
      <div class="tip" id="tip"></div>
    </div>
  </div>
</main>
<footer id="demo-note"></footer>
<script src="../_shared/chrome.js"></script>
<script>
  const NS = 'http://www.w3.org/2000/svg';
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago'];
  const series = [
    { name: 'Ingresos', color: '#4f46e5', data: [32,45,38,52,49,63,58,71], on: true },
    { name: 'Gastos',   color: '#0468d7', data: [28,30,34,31,40,38,44,42], on: true },
  ];
  const W = 600, H = 260, PL = 40, PR = 14, PT = 16, PB = 28;
  const maxV = 80, n = meses.length;
  const x = (i) => PL + (W - PL - PR) * (i / (n - 1));
  const y = (v) => PT + (H - PT - PB) * (1 - v / maxV);
  const svg = document.getElementById('svg');
  const tip = document.getElementById('tip');

  function el(t, a) { const e = document.createElementNS(NS, t); for (const k in a) e.setAttribute(k, a[k]); return e; }
  function path(data) { return data.map((v, i) => `${i ? 'L' : 'M'}${x(i)},${y(v)}`).join(' '); }

  function draw() {
    svg.innerHTML = '';
    // grid + y labels
    for (let g = 0; g <= 4; g++) {
      const v = maxV * g / 4;
      svg.appendChild(el('line', { class: 'gl', x1: PL, x2: W - PR, y1: y(v), y2: y(v) }));
      const t = el('text', { class: 'lbl', x: PL - 8, y: y(v) + 4, 'text-anchor': 'end' }); t.textContent = v; svg.appendChild(t);
    }
    // x labels
    meses.forEach((m, i) => { const t = el('text', { class: 'lbl', x: x(i), y: H - 8, 'text-anchor': 'middle' }); t.textContent = m; svg.appendChild(t); });
    svg.appendChild(el('line', { class: 'axis', x1: PL, x2: W - PR, y1: y(0), y2: y(0) }));

    series.forEach((s) => {
      if (!s.on) return;
      const area = el('path', { class: 'area', fill: s.color, d: path(s.data) + ` L${x(n-1)},${y(0)} L${x(0)},${y(0)} Z` });
      svg.appendChild(area);
      const ln = el('path', { class: 'ln', stroke: s.color, d: path(s.data) });
      svg.appendChild(ln);
      const len = ln.getTotalLength();
      ln.style.strokeDasharray = len; ln.style.strokeDashoffset = len;
      ln.getBoundingClientRect();
      ln.style.transition = 'stroke-dashoffset 1s ease';
      ln.style.strokeDashoffset = 0;
    });
    guide = el('line', { class: 'guide', y1: PT, y2: H - PB }); svg.appendChild(guide);
    dots = series.map((s) => { const c = el('circle', { class: 'dot-pt', r: 4, fill: s.color, stroke: 'var(--surface)', 'stroke-width': 2 }); svg.appendChild(c); return c; });
  }
  let guide, dots;

  svg.addEventListener('mousemove', (e) => {
    const r = svg.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width * W;
    let i = Math.round((px - PL) / ((W - PL - PR) / (n - 1)));
    i = Math.max(0, Math.min(n - 1, i));
    guide.setAttribute('x1', x(i)); guide.setAttribute('x2', x(i)); guide.style.opacity = 1;
    const rows = [];
    series.forEach((s, k) => {
      if (!s.on) { dots[k].style.opacity = 0; return; }
      dots[k].setAttribute('cx', x(i)); dots[k].setAttribute('cy', y(s.data[i])); dots[k].style.opacity = 1;
      rows.push(`<div class="t-r"><span class="dot" style="width:9px;height:9px;border-radius:2px;background:${s.color}"></span>${s.name}: <b>$${s.data[i]}k</b></div>`);
    });
    tip.innerHTML = `<div class="t-m">${meses[i]} 2026</div>${rows.join('')}`;
    tip.style.left = (x(i) / W * 100) + '%';
    tip.style.top = (Math.min(...series.filter(s=>s.on).map(s => y(s.data[i]))) / H * 100) + '%';
    tip.style.opacity = 1;
  });
  svg.addEventListener('mouseleave', () => { guide.style.opacity = 0; tip.style.opacity = 0; dots.forEach((d) => d.style.opacity = 0); });

  const legend = document.getElementById('legend');
  series.forEach((s, k) => {
    const b = document.createElement('button');
    b.innerHTML = `<span class="dot" style="background:${s.color}"></span><span class="lab">${s.name}</span>`;
    b.addEventListener('click', () => { s.on = !s.on; b.querySelector('.lab').classList.toggle('off', !s.on); draw(); });
    legend.appendChild(b);
  });

  draw();
</script>
</body>
</html>
